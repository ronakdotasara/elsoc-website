# Full local/staging parity: `docker compose up` boots Postgres (with pgvector)
# and the app. First run: `docker compose exec app ./node_modules/.bin/prisma db seed`
# (or run the seed locally against localhost:5432).
services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: elsoc
      POSTGRES_PASSWORD: elsoc
      POSTGRES_DB: elsoc
    ports:
      # Bound to loopback only — never expose Postgres on a public interface.
      # Reach it from the host (psql, Prisma Studio) or via an SSH tunnel:
      #   ssh -L 5432:localhost:5432 elsoc@nith.ac.in
      - "127.0.0.1:5432:5432"
    volumes:
      - elsoc-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elsoc -d elsoc"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://elsoc:elsoc@db:5432/elsoc
      AUTH_SECRET: ${AUTH_SECRET:-dev-only-secret-change-me}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      AUTH_TRUST_HOST: "true"
      ADMIN_USERNAME: ${ADMIN_USERNAME:-elsocadmin}
      ADMIN_SEED_PASSWORD: ${ADMIN_SEED_PASSWORD:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ELSOC_CHAT_MODEL: ${ELSOC_CHAT_MODEL:-claude-haiku-4-5-20251001}
      PRISMA_DB_PUSH: "1"
    ports:
      - "3000:3000"
    volumes:
      - elsoc-uploads:/app/public/uploads

volumes:
  elsoc-pgdata:
  elsoc-uploads:
